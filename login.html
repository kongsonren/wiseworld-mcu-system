<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内部登录 - IOTOR 宜欧特</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
            padding: 50px 40px;
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo p {
            color: #666;
            margin-top: 8px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .back-link {
            text-align: center;
            margin-top: 25px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .notice {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .notice p {
            font-size: 13px;
            color: #555;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .login-container {
                padding: 40px 30px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>IOTOR 宜欧特</h1>
            <p>内部管理系统登录</p>
        </div>

        <div class="notice">
            <p>🔒 仅限授权人员访问。请输入您的内部账号和密码进行登录。</p>
            <p style="margin-top: 8px; font-size: 12px; color: #666;">💡 所有用户初始密码均为：<strong>admin123</strong>（建议首次登录后立即修改）</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">用户名 / 邮箱</label>
                <input type="text" id="username" name="username" required placeholder="请输入用户名">
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required placeholder="请输入密码">
            </div>

            <button type="submit" class="login-btn">登 录</button>
        </form>

        <div class="back-link">
            <a href="index.html">← 返回官方网站</a>
        </div>
    </div>

    <script src="iotors-website/js/auth.js"></script>
    <script>
        // 使用 AuthSystem 统一认证
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const submitBtn = document.querySelector('.login-btn');

            // 禁用按钮，显示加载状态
            submitBtn.disabled = true;
            submitBtn.textContent = '登录中...';

            // 调用 AuthSystem.login()
            const result = AuthSystem.login(username, password);

            if (result.success) {
                // 显示成功提示
                submitBtn.textContent = '登录成功！';
                submitBtn.style.background = 'linear-gradient(135deg, #10b981 0%, #059669 100%)';

                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 800);
            } else {
                // 显示错误提示
                alert('❌ 登录失败\n\n' + result.message + '\n\n默认账号：\n用户名：admin\n密码：admin123');
                submitBtn.disabled = false;
                submitBtn.textContent = '登 录';
                submitBtn.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
            }
        });

        // 如果已登录，直接跳转到 dashboard
        if (AuthSystem.isLoggedIn()) {
            window.location.href = 'dashboard.html';
        }
    </script>

    <!-- 页脚 -->
    <footer style="position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.8); color: rgba(255,255,255,0.8); padding: 15px 20px; text-align: center; font-size: 12px;">
        <div style="display: flex; justify-content: center; align-items: center; gap: 20px;">
            <span>&copy; 2026 IOTOR 宜欧特。All rights reserved.</span>
            <span>|</span>
            <div style="display: flex; align-items: center; gap: 8px;">
                <span>官网二维码</span>
                <img src="images/qrcode.png" alt="IOTOR 官网二维码" style="width: 30px; height: 30px; border: 1px solid rgba(255,255,255,0.5); border-radius: 4px; cursor: pointer;" onclick="alert('扫描二维码访问 IOTOR 官网：https://www.iotors.com')" title="扫描二维码访问官网">
            </div>
        </div>
    </footer>
</body>
</html>
